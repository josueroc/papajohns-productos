service: papajohns-product-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 1024
  timeout: 29

  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole

  environment:
    PRODUCTS_TABLE: ${self:service}-products-${self:provider.stage}
    PRODUCT_IMAGES_BUCKET: ${self:service}-images-${self:provider.stage}

functions:
  getProducts:
    handler: src/handlers/get_products.lambda_handler
    events:
      - http:
          path: /tenants/{tenantId}/products
          method: get
          cors: true

resources:
  Resources:

    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PRODUCTS_TABLE}
        BillingMode: PAY_PER_REQUEST

        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: productId
            AttributeType: S

        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: productId
            KeyType: RANGE

    ProductImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.PRODUCT_IMAGES_BUCKET}
